  <rect x="25" y="25" width="50" height="30" fill="#ffffff"/>
  
  <!-- TV3 text -->
  <text x="30" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#dc2626">TV3</text>
  
  <!-- Group text -->
