<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <!-- Truck outline -->
  <rect x="20" y="40" width="40" height="25" fill="#dc2626" rx="3"/>
  <rect x="60" y="35" width="80" height="30" fill="#1e40af" rx="2"/>
  
  <!-- Truck cab -->
  <rect x="22" y="42" width="36" height="20" fill="#ffffff"/>
  <rect x="25" y="45" width="8" height="6" fill="#06b6d4"/>
  
  <!-- Truck wheels -->
  <circle cx="35" cy="70" r="6" fill="#374151"/>
  <circle cx="35" cy="70" r="3" fill="#6b7280"/>
  <circle cx="110" cy="70" r="6" fill="#374151"/>
  <circle cx="110" cy="70" r="3" fill="#6b7280"/>
  <circle cx="125" cy="70" r="6" fill="#374151"/>
  <circle cx="125" cy="70" r="3" fill="#6b7280"/>
  
  <!-- Cargo area details -->
  <rect x="65" y="40" width="70" height="4" fill="#ffffff"/>
  <rect x="65" y="50" width="70" height="2" fill="#ffffff"/>
  <rect x="65" y="55" width="70" height="2" fill="#ffffff"/>
  
  <!-- Company name -->
  <text x="160" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#dc2626">DOLE</text>
  <text x="160" y="55" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e40af">KRAVAS AUTO</text>
  <text x="160" y="75" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">TRANSPORT SERVICES</text>
  
  <!-- Motion lines -->
  <line x1="10" y1="30" x2="15" y2="30" stroke="#fbbf24" stroke-width="2"/>
  <line x1="8" y1="35" x2="13" y2="35" stroke="#fbbf24" stroke-width="2"/>
  <line x1="12" y1="40" x2="17" y2="40" stroke="#fbbf24" stroke-width="2"/>
</svg>