# www → apex (HTTP)
server {
    listen 80;
    server_name www.oskvid.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://oskvid.com$request_uri;
    }
}

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name oskvid.com;
    
    # Allow Let's Encrypt challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name oskvid.com;
    client_max_body_size 100M;
    
    
    # SSL certificate paths (will be mounted from ssl directory)
    ssl_certificate /etc/nginx/ssl/live/oskvid.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/oskvid.com/privkey.pem;
    
    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Proxy settings for Next.js app
    location / {
        proxy_pass http://nextjs-app:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_cache_bypass $http_upgrade;
        
        # Buffer settings to prevent disk buffering warnings
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}

# www → apex (HTTPS)
server {
    listen 443 ssl;
    http2 on;
    server_name www.oskvid.com;

    ssl_certificate /etc/nginx/ssl/live/oskvid.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/oskvid.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://oskvid.com$request_uri;
}

