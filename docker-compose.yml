services:
  # Next.js application
  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextjs-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - ./public/images:/app/public/images
      - ./public/videos:/app/public/videos
    networks:
      - web

  # Nginx reverse proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: nginx-ssl
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl
      - certbot-www:/var/www/certbot
    depends_on:
      - nextjs-app
    networks:
      - web
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/.well-known/acme-challenge/ >/dev/null 2>&1 || nginx -t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Certbot for SSL certificate management
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - certbot-www:/var/www/certbot
      - ./ssl:/etc/letsencrypt
      - ./scripts/certbot-renew.sh:/opt/certbot-renew.sh
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: "/bin/sh -c 'apk add --no-cache docker-cli && chmod +x /opt/certbot-renew.sh; trap exit TERM; while :; do /opt/certbot-renew.sh; sleep 12h & wait $${!}; done;'"
    healthcheck:
      test: ["CMD", "certbot", "--version"]
      interval: 1h
      timeout: 10s
      retries: 3
      start_period: 30s

  # One-shot certbot verification harness (dry-run, no real cert issued)
  # Run with: docker compose --profile test run --rm certbot-test
  certbot-test:
    image: certbot/certbot
    profiles: ["test"]
    container_name: certbot-test
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
      - ./scripts/test-certbot.sh:/opt/test-certbot.sh:ro
    entrypoint: ["/bin/sh", "/opt/test-certbot.sh"]
    depends_on:
      - nginx
    networks:
      - web

networks:
  web:
    driver: bridge

volumes:
  certbot-www:
